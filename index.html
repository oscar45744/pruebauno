<script>
const API_URL = "https://sheetdb.io/api/v1/bjse0pjprw04r";

let allTickets = [];
let seleccionado = null;
let isLoading = false;
let usedNumbers = new Set();

// ==========================
// TOAST
// ==========================
function showToast(msg, type = "success") {
  const c = document.getElementById("toast-container");
  const t = document.createElement("div");

  const colors = {
    success: "background:#065f46;color:#34d399;",
    error: "background:#7f1d1d;color:#fca5a5;",
    info: "background:#1e3a5f;color:#93c5fd;"
  };

  t.className = "toast rounded-lg px-4 py-3 text-sm font-500 shadow-lg";
  t.style.cssText = colors[type] || colors.info;
  t.textContent = msg;

  c.appendChild(t);

  setTimeout(() => {
    t.remove();
  }, 3000);
}

// ==========================
// CARGAR BOLETOS
// ==========================
async function cargarBoletos() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    allTickets = data.map(t => ({
      numero: parseInt(t.numero),
      nombre: t.nombre,
      telefono: t.telefono
    }));

    renderGrid();

  } catch (err) {
    console.error(err);
    showToast("Error al cargar boletos", "error");
  }
}

// ==========================
// RENDER GRID
// ==========================
function renderGrid() {
  const grid = document.getElementById("grid");

  usedNumbers.clear();

  allTickets.forEach(t => {
    usedNumbers.add(parseInt(t.numero));
  });

  if (grid.children.length === 0) {

    for (let i = 1; i <= 150; i++) {

      const div = document.createElement("div");

      div.className =
        "ticket rounded-lg flex items-center justify-center text-xs font-600 cursor-pointer relative";

      div.style.cssText =
        "aspect-ratio:1; min-height:50px; font-size:14px; font-weight:700;";

      div.dataset.num = i;

      div.textContent = String(i).padStart(3, "0");

      div.onclick = () => selectTicket(i, div);

      grid.appendChild(div);
    }
  }

  let available = 0;

  grid.querySelectorAll(".ticket").forEach(div => {

    const num = parseInt(div.dataset.num);

    const taken = usedNumbers.has(num);

    div.classList.remove("taken", "selected");

    if (taken) {

      div.classList.add("taken");

      div.style.background = "#7f1d1d";
      div.style.color = "#fca5a5";
      div.style.cursor = "not-allowed";

    } else {

      div.style.background = "rgba(255,255,255,0.07)";
      div.style.color = "white";
      div.style.cursor = "pointer";

      available++;

      if (num === seleccionado) {

        div.classList.add("selected");

        div.style.background = "#065f46";
        div.style.color = "#34d399";
      }
    }
  });

  document.getElementById("available-count").textContent = available;

  const sd = document.getElementById("selected-display");

  if (seleccionado && !usedNumbers.has(seleccionado)) {

    sd.innerHTML =
      `✅ Número seleccionado:
      <span style="color:#34d399;font-weight:700;">
      #${String(seleccionado).padStart(3, "0")}
      </span>`;

  } else {

    sd.textContent = "Selecciona un número abajo";
    sd.style.color = "#64748b";
  }
}

// ==========================
// SELECCIONAR BOLETO
// ==========================
function selectTicket(num, div) {

  if (div.classList.contains("taken")) return;

  seleccionado = (seleccionado === num)
    ? null
    : num;

  renderGrid();
}

// ==========================
// REGISTRAR BOLETO
// ==========================
window.registrar = async function () {

  const nombre =
    document.getElementById("nombre").value.trim();

  const telefono =
    document.getElementById("telefono").value.trim();

  if (!nombre || !telefono) {

    showToast("Completa nombre y teléfono", "error");
    return;
  }

  if (!seleccionado) {

    showToast("Selecciona un número", "error");
    return;
  }

  if (usedNumbers.has(seleccionado)) {

    showToast("Ese número ya está ocupado", "error");

    seleccionado = null;

    renderGrid();

    return;
  }

  if (isLoading) return;

  isLoading = true;

  const btn = document.getElementById("register-btn");

  btn.style.opacity = "0.5";
  btn.style.pointerEvents = "none";

  try {

    await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        data: [{
          numero: seleccionado,
          nombre: nombre,
          telefono: telefono,
          created_at: new Date().toISOString()
        }]
      })
    });

    showToast(
      `✅ Boleto #${String(seleccionado).padStart(3, "0")} registrado`
    );

    seleccionado = null;

    document.getElementById("nombre").value = "";
    document.getElementById("telefono").value = "";

    await cargarBoletos();

  } catch (err) {

    console.error(err);

    showToast("Error al registrar", "error");

  } finally {

    isLoading = false;

    btn.style.opacity = "1";
    btn.style.pointerEvents = "auto";
  }
};

// ==========================
// INICIAR
// ==========================
window.addEventListener("load", async () => {

  lucide.createIcons();

  await cargarBoletos();
});
</script>
